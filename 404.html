<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Stránka nenalezena | SEBIT Solutions</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon_rounded.png" type="image/png">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SEBIT Design System -->
  <link rel="stylesheet" href="/SEBIT Design System/colors_and_type.css">
  <link rel="stylesheet" href="/shared/sebit-components.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { 'sebit-navy': '#002B5C', 'sebit-lime': '#C6FF00' },
        fontFamily: { sans: ['Inter', 'sans-serif'] }
      }
    }
  }
  </script>

  <style>
    /* Arrow stroke-draw animation from DS loader_arrow.html */
    .draw polyline {
      stroke-dasharray: 180;
      stroke-dashoffset: 180;
      animation: drawArrow 1.8s cubic-bezier(.7,0,.3,1) infinite;
    }
    @keyframes drawArrow {
      0%   { stroke-dashoffset: 180; }
      45%  { stroke-dashoffset: 0;   }
      55%  { stroke-dashoffset: 0;   }
      100% { stroke-dashoffset: -180; }
    }

    /* Subtle float animation for the 404 number */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    /* Gradient text for 404 */
    .gradient-text {
      background: linear-gradient(135deg, #C6FF00 0%, #ffffff 50%, #C6FF00 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
</head>
<body class="antialiased">

  <!-- Full-viewport 404 page — navy background with lime accents -->
  <div class="min-h-screen bg-sebit-navy flex flex-col items-center justify-center px-4 text-center relative overflow-hidden">

    <!-- Background decorative arrows (subtle) -->
    <div class="absolute inset-0 opacity-[0.03] pointer-events-none">
      <svg class="absolute top-[10%] left-[5%] w-48 h-48" viewBox="0 0 64 64">
        <polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <svg class="absolute top-[20%] right-[10%] w-32 h-32 rotate-45" viewBox="0 0 64 64">
        <polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <svg class="absolute bottom-[15%] left-[15%] w-40 h-40 -rotate-12" viewBox="0 0 64 64">
        <polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <svg class="absolute bottom-[25%] right-[8%] w-56 h-56 rotate-90" viewBox="0 0 64 64">
        <polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <!-- Animated arrow loader -->
    <div class="mb-8">
      <svg class="draw w-20 h-20" viewBox="0 0 64 64">
        <polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <!-- 404 number -->
    <h1 class="text-8xl md:text-[10rem] font-extrabold gradient-text float leading-none mb-4">
      404
    </h1>

    <!-- Message -->
    <p class="text-xl md:text-2xl text-white font-semibold mb-2">
      Stránka nenalezena
    </p>
    <p class="text-gray-400 max-w-md mb-10">
      Omlouváme se, ale stránka, kterou hledáte, neexistuje nebo byla přesunuta.
    </p>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-4">
      <a href="/"
         class="inline-flex items-center gap-2 bg-white text-sebit-navy px-8 py-3 rounded-full font-semibold shadow-lg hover:bg-gray-100 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Zpět na hlavní stránku
      </a>
      <a href="mailto:info@sebit.cz"
         class="inline-flex items-center gap-2 border border-white/30 text-white px-8 py-3 rounded-full font-semibold hover:bg-white/10 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Kontaktovat nás
      </a>
    </div>

    <!-- Footer-like branding -->
    <div class="absolute bottom-6 text-center">
      <a href="/" class="inline-flex items-center gap-2 text-white/40 hover:text-white/70 transition text-sm">
        <img src="/favicon_arrow.svg" alt="" class="h-5 w-auto opacity-40">
        SEBIT Solutions s.r.o.
      </a>
    </div>
  </div>

</body>
</html>
