<style>
/* =========================================================================
   SEBIT Group — Colors & Type
   Extracted from source/index.html, brand_guidelines.md, and division pages.
   ------------------------------------------------------------------------- */

/* Inter is loaded from Google Fonts in every source page.
   Keep using the CDN — no local font files in the repo. */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  /* ---------- Brand primitives ---------- */
  --sebit-navy: #002B5C;       /* Primary 1 — text, hero bgs, primary UI */
  --sebit-lime: #C6FF00;       /* Accent — arrow, CTAs, hover highlights */
  --sebit-white: #FFFFFF;
  --sebit-black: #111111;      /* "Very dark gray" alt background, per guidelines */

  /* Navy tints (from bg-white bg-opacity-10 over navy, etc.) */
  --navy-900: #001a3a;
  --navy-700: #002B5C;
  --navy-500: #1e4a80;
  --navy-300: #5e7ca8;

  /* Neutrals — Tailwind gray scale as used in source pages */
  --gray-50:  #f9fafb;   /* bg-gray-50   — kontakt section */
  --gray-100: #f3f4f6;   /* bg-gray-100  — "Software development" section */
  --gray-200: #e5e7eb;   /* "more-btn" default */
  --gray-300: #d1d5db;   /* borders — footer copy, hero subtitle on navy */
  --gray-500: #6b7280;
  --gray-600: #4b5563;   /* body text on white */
  --gray-700: #374151;
  --gray-800: #1f2937;   /* default antialiased text */

  /* ---------- Semantic foreground ---------- */
  --fg-1: var(--sebit-navy);   /* headings, logotype */
  --fg-2: var(--gray-800);     /* body default */
  --fg-3: var(--gray-600);     /* paragraph under headings, card body */
  --fg-muted: var(--gray-500);
  --fg-on-navy: var(--sebit-white);
  --fg-on-navy-muted: var(--gray-300);
  --fg-accent: var(--sebit-lime);
  --fg-link: var(--sebit-navy);

  /* ---------- Semantic background ---------- */
  --bg-0: var(--sebit-white);
  --bg-1: var(--gray-50);
  --bg-2: var(--gray-100);
  --bg-navy: var(--sebit-navy);
  --bg-card: var(--sebit-white);
  --bg-navy-translucent: rgba(255, 255, 255, 0.1);      /* "bg-white bg-opacity-10" */
  --border-navy-translucent: rgba(255, 255, 255, 0.2);

  /* ---------- Borders & shadow ---------- */
  --border-subtle: var(--gray-300);
  --border-default: #d1d5db;
  --radius-sm: 0.25rem;   /* rounded        — inputs, more-btn */
  --radius-md: 0.5rem;    /* rounded-lg     — cards */
  --radius-lg: 0.75rem;   /* rounded-xl     — testimonial cards */
  --radius-pill: 9999px;  /* rounded-full   — all CTAs */

  /* Tailwind default shadow/shadow-lg/shadow-2xl — used as-is in source */
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow:    0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
  --shadow-2xl:0 25px 50px -12px rgba(0,0,0,0.25);

  /* ---------- Spacing (Tailwind scale, only the ones SEBIT actually uses) ---------- */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-6: 1.5rem;    /* card padding (p-6) */
  --space-8: 2rem;      /* grid gap, section padding (py-8) */
  --space-12: 3rem;     /* mb-12 section heading */
  --space-16: 4rem;     /* py-16 divisions */
  --space-20: 5rem;     /* py-20 consulting/software sections */

  /* ---------- Type ---------- */
  --font-sans: 'Inter', 'Poppins', ui-sans-serif, system-ui, -apple-system,
               'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  /* No serif, no mono — SEBIT sites ship Inter only. */

  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --fw-extrabold: 800;

  --leading-tight: 1.15;
  --leading-snug: 1.3;
  --leading-normal: 1.5;
  --leading-relaxed: 1.625;

  --ls-tight: -0.01em;
  --ls-wide: 0.04em;    /* logotype sub-word "SOLUTIONS" */
  --ls-wider: 0.08em;   /* uppercase eyebrow on manifest */
}

/* =========================================================================
   Semantic type classes
   Mirror the real patterns in source/index.html (text-4xl/6xl, font-extrabold,
   etc.) so you can build a page without remembering Tailwind classes.
   ------------------------------------------------------------------------- */

html, body {
  font-family: var(--font-sans);
  color: var(--fg-2);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: var(--leading-normal);
}

/* Display — hero h1. Mobile 2.25rem (text-4xl), desktop 3.75rem (text-6xl) */
.sebit-display,
h1.sebit-display {
  font-size: clamp(2.25rem, 4vw + 1rem, 3.75rem);
  font-weight: var(--fw-extrabold);
  line-height: var(--leading-tight);
  letter-spacing: var(--ls-tight);
  color: var(--fg-1);
  margin: 0 0 1rem;
}

/* Section heading — text-3xl font-bold */
.sebit-h2, h2.sebit-h2 {
  font-size: 1.875rem; /* 30px */
  font-weight: var(--fw-bold);
  line-height: var(--leading-snug);
  color: var(--fg-1);
  margin: 0 0 1rem;
}

/* Card heading — text-xl font-semibold */
.sebit-h3, h3.sebit-h3 {
  font-size: 1.25rem;
  font-weight: var(--fw-semibold);
  line-height: var(--leading-snug);
  color: var(--fg-1);
  margin: 0 0 0.5rem;
}

/* Lead / hero subtitle — text-lg md:text-2xl */
.sebit-lead {
  font-size: clamp(1.125rem, 1vw + 1rem, 1.5rem);
  font-weight: var(--fw-regular);
  line-height: var(--leading-relaxed);
  color: var(--fg-on-navy-muted);
}

/* Body — default paragraph */
.sebit-body, p {
  font-size: 1rem;
  line-height: var(--leading-relaxed);
  color: var(--fg-3);
}

/* Small / meta */
.sebit-small { font-size: 0.875rem; color: var(--fg-muted); }

/* Eyebrow — uppercase lime tag used on Manifest */
.sebit-eyebrow {
  font-size: 0.875rem;
  font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-wider);
  text-transform: uppercase;
  color: var(--fg-accent);
}

/* Big stats — "50+", "98%", lime on navy */
.sebit-stat {
  font-size: 3rem;
  font-weight: var(--fw-extrabold);
  color: var(--fg-accent);
  line-height: 1;
}

/* Links — navy by default, lime on hover (the universal SEBIT link style) */
a { color: var(--fg-link); text-decoration: none; }
a:hover { color: var(--fg-accent); }

</style>

// ---------- ContactForm ----------
function ContactForm() {
  const [sent, setSent] = React.useState(false);
  const [form, setForm] = React.useState({ name: '', email: '', message: '' });
  const change = (k) => (e) => setForm({ ...form, [k]: e.target.value });

    e.preventDefault();
    setSent(true);
    setTimeout(() => setSent(false), 3500);
  };
  return (
    <section id="kontakt" className="py-20 bg-gray-50">
      <div className="container mx-auto px-4">
        <div className="text-center mb-12">

            <ul className="space-y-4 text-gray-700">

              <li><strong>IČO:</strong> 22573780</li>
              <li><strong>DIČ:</strong> CZ22573780</li>
              <li><strong>Adresa:</strong> Zásušní 2926, Mělník 276 01</li>
              <li><strong>Telefon:</strong> <a href="tel:+420721405384" className="text-sebit-navy hover:underline">+420 721 405 384</a></li>
              <li><strong>E-mail:</strong> <a href="mailto:info@sebit.cz" className="text-sebit-navy hover:underline">info@sebit.cz</a></li>
            </ul>
          </div>
          <div className="bg-white p-8 rounded-lg shadow-lg">
            <form className="space-y-6" onSubmit={submit}>
              <div>
                <label className="block text-gray-800 font-medium mb-2">Jméno</label>
                <input type="text" required value={form.name} onChange={change('name')}
                       className="w-full border border-gray-300 px-4 py-3 rounded focus:outline-none focus:ring-2 focus:ring-sebit-navy focus:border-sebit-navy" placeholder="Vaše jméno" />

              <div>
                <label className="block text-gray-800 font-medium mb-2">Email</label>

              </div>
              <div>
                <label className="block text-gray-800 font-medium mb-2">Zpráva</label>
                <textarea rows="5" required value={form.message} onChange={change('message')}

              </div>
              {sent && (
                <div className="text-sm font-medium p-3 rounded bg-green-50 text-green-700 border border-green-200">
                  Zpráva byla úspěšně odeslána. Brzy se ozveme!
                </div>
              )}
              <button type="submit" className="w-full bg-sebit-navy text-white font-semibold py-3 rounded hover:bg-opacity-90 transition">
