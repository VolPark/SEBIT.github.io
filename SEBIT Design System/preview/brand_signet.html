<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SEBIT — Signet</title>
<style>
  body { margin: 0; padding: 16px; background: #fff; font-family: 'Inter', sans-serif; display: grid; grid-template-columns: 140px 1fr 140px 140px; gap: 12px; align-items: stretch; }
  .tile { border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 14px; flex-direction: column; gap: 10px; }
  .tile.white { border: 1px solid #e5e7eb; }
  .tile.navy { background: #002B5C; }
  .tile.lime { background: #C6FF00; }
  .tile svg { height: 80px; width: auto; }
  .label { font-size: 10px; color: #6b7280; font-family: ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.05em; }
  .tile.navy .label { color: #C6FF00; }
  .tile.lime .label { color: #002B5C; }
  .body { display: flex; flex-direction: column; justify-content: center; padding: 8px 4px; }
  .body h3 { margin: 0; font-size: 16px; color: #002B5C; font-weight: 700; }
  .body p { margin: 6px 0 0; font-size: 11px; color: #4b5563; line-height: 1.5; }
</style>
</head>
<body>
  <div class="tile white">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span class="label">on white</span>
  </div>
  <div class="body">
    <h3>Arrow signet</h3>
    <p>Three-point lime chevron — the core brand mark. Always left of the wordmark. Clear space equals the arrow's width. On lime backgrounds, use the navy variant.</p>
  </div>
  <div class="tile navy">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><polyline points="16,20 40,32 16,44" stroke="#C6FF00" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span class="label">on navy</span>
  </div>
  <div class="tile lime">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><polyline points="16,20 40,32 16,44" stroke="#002B5C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <span class="label">on lime</span>
  </div>
</body>
</html>
