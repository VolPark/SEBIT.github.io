<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SEBIT — Stats Row</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #002B5C; font-family: 'Inter', sans-serif; padding: 30px 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center; }
  .cell { display: flex; flex-direction: column; align-items: center; }
  .bar { width: 28px; height: 3px; background: #C6FF00; border-radius: 2px; margin-bottom: 14px; }
  .stat-num { font-size: 48px; font-weight: 800; color: #ffffff; line-height: 1; margin-bottom: 8px; letter-spacing: -0.01em; }
  .stat-lbl { color: #d1d5db; font-size: 13px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="cell"><div class="bar"></div><div class="stat-num">50+</div><div class="stat-lbl">Úspěšně obsazených pozic</div></div>
  <div class="cell"><div class="bar"></div><div class="stat-num">5+</div><div class="stat-lbl">Let zkušeností na trhu</div></div>
  <div class="cell"><div class="bar"></div><div class="stat-num">98%</div><div class="stat-lbl">Spokojenost klientů</div></div>
</body>
</html>
